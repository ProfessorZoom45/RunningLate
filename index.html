<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Running Late Dynasty CFB 27</title>
  <meta name="description" content="Running Late Dynasty CFB 27 special issue splash cover.">
  <meta name="theme-color" content="#050505">
  <meta property="og:title" content="Running Late Dynasty CFB 27">
  <meta property="og:description" content="Running Late Dynasty CFB 27 special issue splash cover.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/dynasty-splash-image-2.png">
  <link rel="icon" href="assets/rld-logo.png" type="image/png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="splash-only" data-page="splash">
  <main class="splash-only__stage" aria-label="Running Late Dynasty splash entry">
    <p class="splash-only__cue">Click Image To Enter The Dynasty Hub</p>
    <a class="splash-only__link" href="hub.html" aria-label="Enter the Running Late Dynasty Hub">
      <img src="assets/images/dynasty-splash-image-2.png" alt="Running Late Dynasty CFB 27 Who Will Fall First splash cover">
    </a>
    <p class="splash-only__timer">Auto-entering in <span id="countdown">30</span> seconds</p>
  </main>
  <script>
    (() => {
      const count = document.getElementById('countdown');
      let seconds = 30;
      const tick = window.setInterval(() => {
        seconds -= 1;
        if(count) count.textContent = seconds;
        if(seconds <= 0){
          window.clearInterval(tick);
          window.location.href = 'hub.html';
        }
      }, 1000);
    })();
  </script>
</body>
</html>
